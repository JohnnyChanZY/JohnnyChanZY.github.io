<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YICO</title>
    <style>
        :root {
            --red: #9D1301;
            --blue: #405DAA;
            --cream: #FEE6AA;
            --gold: #F7BF17;
            --bg: #fafafa;
            --text-dark: #2a2a2a;
            --text-gray: #666;
            --white: #ffffff;
            --radius-lg: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
        }

        .bg-circle-1 {
            width: 500px;
            height: 500px;
            background: var(--red);
            top: -200px;
            right: -100px;
        }

        .bg-circle-2 {
            width: 400px;
            height: 400px;
            background: var(--blue);
            bottom: -100px;
            left: -100px;
        }

        .bg-circle-3 {
            width: 200px;
            height: 200px;
            background: var(--gold);
            top: 40%;
            right: 10%;
            opacity: 0.1;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        h1 span {
            color: var(--blue);
        }

        .subtitle {
            color: var(--text-gray);
            font-size: 1.2rem;
            margin-bottom: 3rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 2rem;
            background: var(--white);
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--text-dark);
            transition: all 0.3s ease;
            border: 2px solid transparent;
            min-width: 280px;
        }

        .link-card:hover {
            transform: translateY(-3px);
            border-color: var(--blue);
            box-shadow: 0 8px 30px rgba(64, 93, 170, 0.15);
        }

        .link-icon {
            font-size: 1.8rem;
        }

        .link-text {
            font-weight: 500;
            font-size: 1.1rem;
        }

        .link-desc {
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 3rem;
            }
            
            .link-card {
                min-width: 100%;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
        <div class="bg-circle bg-circle-3"></div>
    </div>

    <h1>YI<span>CO</span></h1>
    <p class="subtitle">我的小站</p>

    <div class="links">
        <a href="trip.html" class="link-card">
            <span class="link-icon">🗓️</span>
            <div>
                <div class="link-text">周末行程</div>
                <div class="link-desc">3月14-15日行程安排</div>
            </div>
        </a>
    </div>
</body>
</html>
