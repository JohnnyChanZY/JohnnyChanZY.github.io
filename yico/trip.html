<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周末行程 | YICO</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #9D1301;
            --blue: #405DAA;
            --cream: #FEE6AA;
            --gold: #F7BF17;
            --red-light: #c44d3a;
            --blue-light: #5a7cc7;
            --cream-light: #fff4cc;
            --bg: #fafafa;
            --bg-warm: #f5f0e8;
            --text-dark: #2a2a2a;
            --text-gray: #666;
            --white: #ffffff;
            --radius: 12px;
            --radius-lg: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            line-height: 1.7;
            min-height: 100vh;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
        }

        .bg-circle-1 {
            width: 500px;
            height: 500px;
            background: var(--red);
            top: -200px;
            right: -100px;
        }

        .bg-circle-2 {
            width: 400px;
            height: 400px;
            background: var(--blue);
            bottom: -100px;
            left: -100px;
        }

        .bg-circle-3 {
            width: 200px;
            height: 200px;
            background: var(--gold);
            top: 40%;
            right: 10%;
            opacity: 0.1;
        }

        /* 头部 */
        .header {
            text-align: center;
            padding: 4rem 2rem 2rem;
        }

        .header-badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: var(--cream);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--red);
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .header h1 span {
            color: var(--blue);
        }

        .header p {
            color: var(--text-gray);
            font-size: 1.1rem;
        }

        /* 容器 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* 日期标签 */
        .day-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 3rem 0 2rem;
        }

        .day-number {
            width: 50px;
            height: 50px;
            background: var(--red);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .day-number.blue {
            background: var(--blue);
        }

        .day-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .day-date {
            color: var(--text-gray);
            font-size: 0.95rem;
        }

        /* 时间线 */
        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, var(--red), var(--blue));
            border-radius: 2px;
        }

        /* 行程卡片 */
        .trip-card {
            position: relative;
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .trip-card:hover {
            transform: translateY(-3px);
            border-color: var(--blue);
            box-shadow: 0 8px 30px rgba(64, 93, 170, 0.15);
        }

        .trip-card::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            background: var(--white);
            border: 3px solid var(--red);
            border-radius: 50%;
        }

        .trip-card:nth-child(odd)::before {
            border-color: var(--red);
        }

        .trip-card:nth-child(even)::before {
            border-color: var(--blue);
        }

        .trip-card:last-child::before {
            background: var(--gold);
            border-color: var(--gold);
        }

        .trip-time {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.8rem;
            background: var(--cream);
            color: var(--red);
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .trip-time svg {
            width: 14px;
            height: 14px;
        }

        .trip-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .trip-icon {
            font-size: 1.5rem;
        }

        .trip-location {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .trip-location svg {
            width: 14px;
            height: 14px;
            color: var(--blue);
        }

        .trip-desc {
            color: var(--text-gray);
            font-size: 0.95rem;
        }

        .trip-tag {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            background: var(--cream-light);
            color: var(--red);
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 0.75rem;
        }

        .trip-tag.food { background: #ffe8e8; color: var(--red); }
        .trip-tag.activity { background: #e8f0fe; color: var(--blue); }
        .trip-tag.movie { background: #f0e8ff; color: #7c3aed; }

        /* 装饰圆点 */
        .decorative-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .decorative-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .decorative-dots span:nth-child(1) { background: var(--red); }
        .decorative-dots span:nth-child(2) { background: var(--blue); }
        .decorative-dots span:nth-child(3) { background: var(--gold); }
        .decorative-dots span:nth-child(4) { background: var(--cream); }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-gray);
            font-size: 0.85rem;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.2rem;
            }

            .container {
                padding: 1rem;
            }

            .timeline {
                padding-left: 20px;
            }

            .timeline::before {
                left: 5px;
            }

            .trip-card::before {
                left: -18px;
                width: 10px;
                height: 10px;
            }

            .day-header {
                margin: 2rem 0 1.5rem;
            }

            .day-number {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            .day-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
        <div class="bg-circle bg-circle-3"></div>
    </div>

    <!-- 头部 -->
    <header class="header">
        <span class="header-badge">✈️ 周末出行</span>
        <h1>我的<span>行程</span>安排</h1>
        <p>2026年3月14日 - 3月15日</p>
    </header>

    <!-- 主要内容 -->
    <div class="container">
        
        <!-- 周六 -->
        <div class="day-header">
            <div class="day-number">1</div>
            <div>
                <div class="day-title">周六</div>
                <div class="day-date">2026年3月14日</div>
            </div>
        </div>

        <div class="timeline">
            <!-- 中午 - 自助餐 -->
            <div class="trip-card">
                <div class="trip-time">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    12:00
                </div>
                <div class="trip-title">
                    <span class="trip-icon">🍽️</span>
                    天河区吃自助餐
                </div>
                <div class="trip-location">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    天河区
                </div>
                <div class="trip-desc">中午去天河区吃一顿丰盛的自助餐！</div>
                <span class="trip-tag food">美食</span>
            </div>

            <!-- 下午 - 拼豆 -->
            <div class="trip-card">
                <div class="trip-time">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    下午
                </div>
                <div class="trip-title">
                    <span class="trip-icon">🎨</span>
                    玩拼豆
                </div>
                <div class="trip-desc">下午一起去玩拼豆（像素艺术拼豆），发挥创意！</div>
                <span class="trip-tag activity">活动</span>
            </div>

            <!-- 晚上 - 火鸡面 -->
            <div class="trip-card">
                <div class="trip-time">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    晚上
                </div>
                <div class="trip-title">
                    <span class="trip-icon">🌶️</span>
                    吃火鸡面
                </div>
                <div class="trip-desc">晚上挑战超辣的🔥火鸡面！</div>
                <span class="trip-tag food">美食</span>
            </div>

            <!-- 晚上 - 电影 -->
            <div class="trip-card">
                <div class="trip-time">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    晚饭后
                </div>
                <div class="trip-title">
                    <span class="trip-icon">🎬</span>
                    看电影
                </div>
                <div class="trip-desc">吃完火鸡面去看一部电影～</div>
                <span class="trip-tag movie">娱乐</span>
            </div>
        </div>

        <!-- 装饰点 -->
        <div class="decorative-dots">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- 周日 -->
        <div class="day-header">
            <div class="day-number blue">2</div>
            <div>
                <div class="day-title">周日</div>
                <div class="day-date">2026年3月15日</div>
            </div>
        </div>

        <div class="timeline">
            <!-- 中午 - 韩国料理 -->
            <div class="trip-card">
                <div class="trip-time">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    12:00
                </div>
                <div class="trip-title">
                    <span class="trip-icon">🥘</span>
                    万达广场吃韩国料理
                </div>
                <div class="trip-location">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    万达广场
                </div>
                <div class="trip-desc">周日中午去万达广场吃正宗的韩国料理！</div>
                <span class="trip-tag food">美食</span>
            </div>

            <!-- 下午 - 布丁 -->
            <div class="trip-card">
                <div class="trip-time">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    下午
                </div>
                <div class="trip-title">
                    <span class="trip-icon">🍮</span>
                    吃布丁
                </div>
                <div class="trip-desc">下午再来一份甜甜的布丁～</div>
                <span class="trip-tag food">美食</span>
            </div>
        </div>

    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>祝周末愉快！🎉</p>
    </footer>
</body>
</html>
