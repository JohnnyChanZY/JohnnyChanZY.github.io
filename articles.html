<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 - JohnnyChan's Blog</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="alternate" type="application/rss+xml" title="RSS" href="rss.xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
        <div class="bg-circle bg-circle-3"></div>
    </div>

    <!-- 导航 -->
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo">
                <span class="logo-icon">◇</span>
                <span class="logo-text">JohnnyChan</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html#home" class="nav-link">首页</a></li>
                <li><a href="index.html#articles" class="nav-link nav-link-active">文章</a></li>
                <li><a href="index.html#projects" class="nav-link">项目</a></li>
                <li><a href="index.html#about" class="nav-link">关于</a></li>
                <li><a href="index.html#contact" class="nav-link">联系</a></li>
            </ul>
            <button class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- 文章列表区域 -->
    <section class="articles-page">
        <div class="section-header">
            <span class="section-tag">ARTICLES</span>
            <h2 class="section-title">文章列表</h2>
            <div class="title-decoration">
                <span></span>
            </div>
            <a href="javascript:void(0)" class="rss-link" id="rssCopyBtn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19 7.38 20 6.18 20C5 20 4 19 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/>
                </svg>
                <span>RSS 订阅</span>
            </a>
        </div>
        <div class="articles-list" id="articlesList">
            <!-- 文章列表由 JS 动态渲染 -->
            <div class="loading">加载中...</div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <p>© 2026 JohnnyChan. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/articles.js"></script>
    <script>
        // RSS 复制功能
        document.getElementById('rssCopyBtn').addEventListener('click', function() {
            const rssUrl = 'https://johnnychzy.github.io/rss.xml';
            navigator.clipboard.writeText(rssUrl).then(() => {
                const btn = this;
                const originalText = btn.querySelector('span').textContent;
                btn.querySelector('span').textContent = '已复制!';
                btn.style.background = 'var(--red)';
                btn.style.color = 'white';
                setTimeout(() => {
                    btn.querySelector('span').textContent = originalText;
                    btn.style.background = '';
                    btn.style.color = '';
                }, 2000);
            });
        });
    </script>
</body>
</html>
